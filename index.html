<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubiuwu | Profile</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }

        /* BACKGROUND - Change the URL inside the quotes below */
        .background {
            position: fixed;
            inset: 0;
            background: url('https://images.wallpapersden.com/image/download/anime-girl-clouds-scenery_bWlpZmqUmZqaraWkpJRmbmdlrWZnZWU.jpg') no-repeat center center/cover;
            filter: brightness(0.4) blur(3px);
            z-index: -1;
        }

        /* ENTRY OVERLAY */
        #entry {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: 1s ease;
        }
        #entry.hide { opacity: 0; pointer-events: none; }
        .pulse { animation: p 2s infinite; letter-spacing: 2px; text-transform: uppercase; font-size: 13px; opacity: 0.6; }
        @keyframes p { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* MAIN CARD */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 24px; margin-bottom: 5px; letter-spacing: 1px; }
        .location { font-size: 12px; color: #bbb; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .bio-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            color: #ddd;
        }

        .socials { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .socials i { font-size: 20px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .socials i:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- ADD YOUR MUSIC LINK HERE -->
    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/o5xf95.mp3" type="audio/mpeg">
    </audio>

    <div id="entry" onclick="enterSite()">
        <div class="pulse">click to view profile</div>
    </div>

    <div class="background"></div>

    <div class="container">
        <div class="profile-card">
            <h1>tubiuwu</h1>
            
            <div class="location">
                <i data-lucide="map-pin" size="14"></i> Earth
            </div>

            <div class="bio-box">Insert a quote or something about you here.</div>
            <div class="bio-box">Selling nothing / Discord: @yourname</div>

            <div class="socials">
                <i data-lucide="github"></i>
                <i data-lucide="instagram"></i>
                <i data-lucide="twitter"></i>
                <i data-lucide="message-circle"></i>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function enterSite() {
            document.getElementById('entry').classList.add('hide');
            let audio = document.getElementById('bg-music');
            audio.volume = 0.4;
            audio.play();
        }
    </script>
</body>
</html>
