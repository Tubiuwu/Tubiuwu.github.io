<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="typewriter-title">@t</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Acrylic / Frosted Glass effect */
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* CUSTOM CURSOR */
        * { cursor: none !important; }
        #cursor-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; color: white; }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            filter: brightness(0.5);
            object-fit: cover;
            display: none; /* Hidden until enter */
        }

        /* ENTRY SCREEN */
        #entry {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 1s ease;
        }
        #entry.hide { opacity: 0; pointer-events: none; }
        .pulse { animation: p 2s infinite; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; opacity: 0.5; }
        @keyframes p { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* CONTENT */
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Acrylic Card Style */
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 380px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; font-weight: 400; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            color: #ddd;
        }

        /* SOCIAL ICONS */
        .socials { display: flex; justify-content: center; gap: 18px; margin-top: 25px; }
        .socials a { color: white; opacity: 0.5; transition: 0.3s ease; text-decoration: none; }
        .socials a:hover { opacity: 1; transform: scale(1.2); }

        /* VIEW COUNTER UI */
        .views { position: fixed; bottom: 20px; left: 20px; font-size: 12px; opacity: 0.4; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div id="entry" onclick="enterSite()">
        <div class="pulse">click to view profile</div>
    </div>

    <video loop playsinline id="bg-video">
        <source src="https://files.catbox.moe/kqy3zv.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="profile-card">
            <h1>tubiuwu</h1>
            
            <div class="info-box">"Innocent Sin"</div>
            <div class="info-box">Discord: .tubiu</div>

            <div class="socials">
                <a href="https://open.spotify.com/user/ypzl18cpzin19zec9bfb31575?si=f26ffe2191794829" target="_blank"><i data-lucide="music"></i></a>
                <a href="https://www.roblox.com/users/10650135323/profile" target="_blank"><i data-lucide="gamepad-2"></i></a>
                <a href="https://www.tiktok.com/@tubiu_" target="_blank"><i data-lucide="video"></i></a>
                <a href="https://steamcommunity.com/id/Tubiu/" target="_blank"><i data-lucide="monitor"></i></a>
            </div>
        </div>
    </div>

    <div class="views">
        <i data-lucide="eye" size="14"></i> 104
    </div>

    <script>
        lucide.createIcons();

        // 1. TYPEWRITER TITLE EFFECT (@t, @tu, etc)
        const titleTag = document.getElementById('typewriter-title');
        const phrases = ["@t", "@tu", "@tub", "@tubi", "@tubiu"];
        let phraseIndex = 0;
        let isAdding = true;

        function updateTitle() {
            titleTag.innerText = phrases[phraseIndex];
            
            if (isAdding) {
                if (phraseIndex < phrases.length - 1) {
                    phraseIndex++;
                } else {
                    isAdding = false;
                }
            } else {
                if (phraseIndex > 0) {
                    phraseIndex--;
                } else {
                    isAdding = true;
                }
            }
            setTimeout(updateTitle, 400);
        }
        updateTitle();

        // 2. SMOOTH DOT CURSOR
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        // 3. ENTER LOGIC (FIXES VIDEO NOT SHOWING)
        function enterSite() {
            document.getElementById('entry').classList.add('hide');
            const video = document.getElementById('bg-video');
            video.style.display = 'block'; // Make video visible
            video.muted = false;
            video.volume = 0.4;
            video.play();
        }
    </script>
</body>
</html>
