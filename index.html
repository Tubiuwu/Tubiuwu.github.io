<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="typewriter-title">@T</title>
    <!-- Font Awesome for better Brand Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.55);
            --border: rgba(255, 255, 255, 0.08);
        }

        /* CUSTOM DOT CURSOR */
        * { cursor: none !important; }
        #cursor-dot {
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 12px rgba(255,255,255,1);
            transition: transform 0.08s ease-out;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; color: white; }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.4);
            object-fit: cover;
            visibility: hidden; /* Prevent flickering before click */
        }

        /* ENTRY SCREEN */
        #entry {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #entry.hide { opacity: 0; pointer-events: none; }
        .pulse { animation: p 2s infinite; letter-spacing: 4px; text-transform: uppercase; font-size: 11px; font-weight: 300; }
        @keyframes p { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.7; } }

        /* ACRYLIC CONTENT */
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            padding: 50px 35px;
            border-radius: 12px;
            text-align: center;
            width: 360px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        h1 { font-size: 22px; margin-bottom: 25px; letter-spacing: 2px; font-weight: 400; text-transform: lowercase; }
        
        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
            color: #ddd;
            letter-spacing: 0.5px;
        }

        /* BETTER SOCIAL ICONS */
        .socials { display: flex; justify-content: center; gap: 25px; margin-top: 30px; }
        .socials a { color: white; font-size: 20px; opacity: 0.4; transition: 0.4s; text-decoration: none; }
        .socials a:hover { opacity: 1; transform: translateY(-5px); text-shadow: 0 0 15px rgba(255,255,255,0.5); }

        .views { position: fixed; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.3; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div id="entry" onclick="enterSite()">
        <div class="pulse">click to enter</div>
    </div>

    <video id="bg-video" loop playsinline>
        <source src="https://files.catbox.moe/kqy3zv.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="profile-card">
            <h1>tubiuwu</h1>
            
            <div class="info-box">"Innocent Sin"</div>
            <div class="info-box">Discord: .tubiu</div>

            <div class="socials">
                <a href="https://open.spotify.com/user/ypzl18cpzin19zec9bfb31575?si=f26ffe2191794829" target="_blank"><i class="fa-brands fa-spotify"></i></a>
                <a href="https://www.roblox.com/users/10650135323/profile" target="_blank"><i class="fa-solid fa-cube"></i></a>
                <a href="https://www.tiktok.com/@tubiu_" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://steamcommunity.com/id/Tubiu/" target="_blank"><i class="fa-brands fa-steam"></i></a>
            </div>
        </div>
    </div>

    <div class="views">
        Views: 104
    </div>

    <script>
        // 1. UPDATED TYPEWRITER TITLE (@T, @Tu, etc)
        const titleTag = document.getElementById('typewriter-title');
        const phrases = ["@T", "@Tu", "@Tub", "@Tubi", "@Tubiu"];
        let phraseIndex = 0;
        let isAdding = true;

        function updateTitle() {
            titleTag.innerText = phrases[phraseIndex];
            if (isAdding) {
                if (phraseIndex < phrases.length - 1) phraseIndex++;
                else isAdding = false;
            } else {
                if (phraseIndex > 0) phraseIndex--;
                else isAdding = true;
            }
            setTimeout(updateTitle, 500);
        }
        updateTitle();

        // 2. CURSOR LOGIC
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        // 3. FORCE VIDEO LOAD ON CLICK
        function enterSite() {
            document.getElementById('entry').classList.add('hide');
            const video = document.getElementById('bg-video');
            video.style.visibility = 'visible';
            video.load(); // Forces the browser to fetch the file
            video.muted = false;
            video.volume = 0.4;
            video.play();
        }
    </script>
</body>
</html>
