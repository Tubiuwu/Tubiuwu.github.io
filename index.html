<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubiuwu | Profile</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* CUSTOM CURSOR */
        * { cursor: none; } /* Hides real cursor */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            transition: transform 0.1s ease-out;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; color: white; }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.4);
            object-fit: cover;
        }

        /* ENTRY SCREEN */
        #entry {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 1s ease;
        }
        #entry.hide { opacity: 0; pointer-events: none; }
        .pulse { animation: p 2s infinite; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; opacity: 0.5; }
        @keyframes p { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* CONTENT */
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; font-weight: 400; }
        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .socials { display: flex; justify-content: center; gap: 20px; margin-top: 25px; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <div id="entry" onclick="enterSite()">
        <div class="pulse">click to enter</div>
    </div>

    <!-- USING YOUR LINK FOR BOTH VIDEO AND AUDIO -->
    <video loop playsinline id="bg-video">
        <source src="https://files.catbox.moe/kqy3zv.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="profile-card">
            <h1>tubiuwu</h1>
            
            <div class="info-box">"Write your custom bio here"</div>
            <div class="info-box">Discord: @yourname</div>

            <div class="socials">
                <i data-lucide="github"></i>
                <i data-lucide="instagram"></i>
                <i data-lucide="message-circle"></i>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        function enterSite() {
            document.getElementById('entry').classList.add('hide');
            const video = document.getElementById('bg-video');
            video.muted = false; // Unmutes the video so audio plays
            video.volume = 0.4;
            video.play();
        }
    </script>
</body>
</html>
